      srs: window.Revision ? window.Revision.exportState() : {}
    };
    const parts = chunk(JSON.stringify(state));
    try {
      store.setItem(PREFIX + "meta", String(parts.length), function () {});
      parts.forEach((p, i) => store.setItem(PREFIX + i, p, function () {}));
      // supprime d'éventuels morceaux résiduels d'une sauvegarde plus grande
      for (let i = parts.length; i < lastCount; i++) store.removeItem(PREFIX + i, function () {});
      lastCount = parts.length;
    } catch (e) {}
  }

  /* ---------- Lecture + fusion au démarrage ---------- */
  function load(cb) {
    cb = cb || function () {};
    if (!available()) return cb(false);
    const store = cs();
    store.getItem(PREFIX + "meta", function (err, meta) {
      const n = parseInt(meta || "0", 10);
      if (err || !n) return cb(false);
      const keys = [];
      for (let i = 0; i < n; i++) keys.push(PREFIX + i);
      store.getItems(keys, function (err2, vals) {
        if (err2 || !vals) return cb(false);
        let json = "";
        for (let i = 0; i < n; i++) json += vals[PREFIX + i] || "";
        let cloud;
        try { cloud = JSON.parse(json); } catch (e) { return cb(false); }
        lastCount = n;
        cb(applyMerge(cloud));
      });
    });
  }

  function applyMerge(cloud) {
    if (!cloud) return false;
    let changed = false;
    suspend = true; // n'enclenche pas de push pendant l'application
    try {
      if (window.Progress) {
        const before = JSON.stringify(window.Progress.load());
        const merged = mergeProgress(window.Progress.load(), cloud.progress);
        window.Progress.save(merged);
        if (before !== JSON.stringify(merged)) changed = true;
      }
      if (window.Revision) {
        const before = JSON.stringify(window.Revision.exportState());
        const merged = mergeSrs(window.Revision.exportState(), cloud.srs);
        window.Revision.importState(merged);
        if (before !== JSON.stringify(merged)) changed = true;
      }
    } catch (e) {}
    suspend = false;
    // pousse l'union fusionnée vers le cloud (les deux appareils convergent)
    scheduleSave();
    return changed;
  }

  function clear(cb) {
    cb = cb || function () {};
    if (!available()) return cb();
    const store = cs();
    store.getKeys(function (err, keys) {
      const k = (keys || []).filter((x) => x.indexOf(PREFIX) === 0);
      if (!k.length) return cb();
      try { store.removeItems(k, function () { cb(); }); } catch (e) { cb(); }
      lastCount = 0;
    });
  }

  return { available, load, scheduleSave, saveNow, clear, mergeProgress, mergeSrs };
})();

</script>
    <script>
/* =====================================================================
   exercises.js — Moteur d'exercices interactifs auto-corrigés
   Types auto-gradés : qcm, trou, association, conjugaison, ordre,
   ecoute, traduction.
   Types de production : production (écrite), oral (reconnaissance vocale).
   Mode test : options.testMode masque le bouton « Vérifier » et expose
   card._grade(show) pour une correction différée et globale.
   ===================================================================== */
window.Exercises = (function () {
  const GRADABLE = ["qcm", "ecoute", "trou", "association", "conjugaison", "ordre", "traduction"];

  /* ---------- Utilitaires ---------- */
  function normalize(s) {
    return String(s == null ? "" : s)
      .toLowerCase()
      .trim()
      .replace(/[.!?;,]+$/g, "")
      .replace(/ß/g, "ss")
      .replace(/ä/g, "ae")
      .replace(/ö/g, "oe")
      .replace(/ü/g, "ue")
      .replace(/\s+/g, " ");
  }
  function eq(a, b) {
    return normalize(a) === normalize(b);
  }
  function matchesAny(value, accepted) {
    return (accepted || []).some((a) => eq(value, a));
  }
  function contains(text, fragment) {
    return normalize(text).includes(normalize(fragment));
  }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function el(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  function typeLabel(t) {
    return (
      {
        qcm: "Choix multiple",
        ecoute: "Compréhension orale",
        trou: "Texte à trous",
        association: "Association",
        conjugaison: "Conjugaison",
        ordre: "Remise en ordre",
        traduction: "Traduction",
        production: "Production écrite",
        oral: "Production orale"
      }[t] || t
    );
  }

  function applyFeedback(card, feedback, ex, res) {
    if (res.ok === null) {
      feedback.className = "exo-feedback show neutre";
      feedback.innerHTML = "👉 " + (res.detail || "Complétez d'abord l'exercice.");
      return;
    }
    feedback.className = "exo-feedback show " + (res.ok ? "juste" : "faux");
    let msg = res.ok ? "✓ Correct ! " : "✗ Pas tout à fait. ";
    if (res.detail) msg += res.detail;
    if (ex.explication) msg += '<div class="exo-explication">💡 ' + ex.explication + "</div>";
    feedback.innerHTML = msg;
    card.classList.toggle("exo-ok", res.ok);
    card.classList.toggle("exo-ko", !res.ok);
  }

  /* ---------- Rendu d'un exercice ---------- */
  function render(ex, index, onResult, options) {
    options = options || {};
    const testMode = !!options.testMode;
    const card = el("div", "exo");
    card.dataset.type = ex.type;

    const head = el("div", "exo-head");
    head.appendChild(el("span", "exo-num", (options.label || "Exercice " + (index + 1))));
    head.appendChild(el("span", "exo-type", typeLabel(ex.type)));
    card.appendChild(head);

    if (ex.consigne) card.appendChild(el("p", "exo-consigne", ex.consigne));

    const body = el("div", "exo-body");
    card.appendChild(body);
    const actions = el("div", "exo-actions");
    const feedback = el("div", "exo-feedback");

    if (GRADABLE.indexOf(ex.type) >= 0) {
      let checker = null;
      switch (ex.type) {
        case "qcm":
        case "ecoute":
          checker = buildChoice(ex, body);
          break;
        case "trou":
          checker = buildTrou(ex, body);
          break;
        case "association":
          checker = buildAssociation(ex, body);
          break;
        case "conjugaison":
          checker = buildConjugaison(ex, body);
          break;
        case "ordre":
          checker = buildOrdre(ex, body);
          break;
        case "traduction":
          checker = buildTraduction(ex, body);
          break;
      }
      // Correction (différée en mode test, sinon via bouton)
      card._grade = function (show) {
        const res = checker ? checker() : { ok: null };
        if (show) applyFeedback(card, feedback, ex, res);
        return res;
      };
      if (!testMode) {
        const checkBtn = el("button", "btn btn-check", "Vérifier");
        checkBtn.type = "button";
        checkBtn.addEventListener("click", () => {
          const res = card._grade(true);
          if (res.ok !== null) {
            if (window.TG) window.TG.haptic(res.ok ? "success" : "error");
            if (onResult) onResult(res.ok);
          }
        });
        actions.appendChild(checkBtn);
      }
    } else if (ex.type === "production") {
      buildProduction(ex, body, actions, feedback, onResult);
    } else if (ex.type === "oral") {
      buildOral(ex, body, actions, feedback, onResult);
    } else {
      body.appendChild(el("p", "", "Type d'exercice inconnu : " + ex.type));
    }

    card.appendChild(actions);
    card.appendChild(feedback);
    return card;
  }

  /* ---------- QCM / Écoute ---------- */
  function buildChoice(ex, body) {
    if (ex.type === "ecoute") {
      const player = el("div", "ecoute-player");
      const big = el("button", "btn-audio big", "🔊 Écouter");
      big.type = "button";
      big.addEventListener("click", () => window.Speech && window.Speech.speak(ex.audio));
      player.appendChild(big);
      player.appendChild(el("span", "ecoute-hint", "Cliquez pour écouter, puis choisissez."));
      body.appendChild(player);
    } else if (ex.question) {
      body.appendChild(el("p", "exo-question", ex.question));
    }
    let selected = -1;
    const opts = el("div", "qcm-options");
    ex.options.forEach((opt, i) => {
      const b = el("button", "qcm-opt", opt);
      b.type = "button";
      b.addEventListener("click", () => {
        if (b.disabled) return;
        selected = i;
        opts.querySelectorAll(".qcm-opt").forEach((o) => o.classList.remove("sel"));
        b.classList.add("sel");
      });
      opts.appendChild(b);
    });
    body.appendChild(opts);

    return function () {
      if (selected < 0) return { ok: null, detail: "Choisissez une réponse." };
      const ok = selected === ex.correct;
      const btns = opts.querySelectorAll(".qcm-opt");
      btns.forEach((b, i) => {
        b.classList.remove("sel");
        if (i === ex.correct) b.classList.add("correct");
        if (i === selected && !ok) b.classList.add("wrong");
        b.disabled = true;
      });
      return { ok, detail: ok ? "" : "La bonne réponse est : « " + ex.options[ex.correct] + " »." };
    };
  }

  /* ---------- Texte à trous ---------- */
  function buildTrou(ex, body) {
    const wrap = el("p", "trou-phrase");
    const parts = ex.texte.split(/(\{\d+\})/g);
    const inputs = [];
    parts.forEach((p) => {
      const m = p.match(/^\{(\d+)\}$/);
      if (m) {
        const inp = el("input", "trou-input");
        inp.type = "text";
        inp.size = 10;
        inp.setAttribute("autocomplete", "off");
        inp.dataset.idx = parseInt(m[1], 10);
        inputs.push(inp);
        wrap.appendChild(inp);
      } else if (p) {
        wrap.appendChild(document.createTextNode(p));
      }
    });
    body.appendChild(wrap);
    if (ex.indice) body.appendChild(el("p", "exo-indice", "Indice : " + ex.indice));

    return function () {
      let allFilled = true;
      let ok = true;
      inputs.forEach((inp) => {
        const idx = parseInt(inp.dataset.idx, 10);
        const val = inp.value.trim();
        if (!val) allFilled = false;
        const good = matchesAny(val, ex.accepte[idx] || []);
        inp.classList.toggle("ok", good);
        inp.classList.toggle("ko", !good && !!val);
        if (!good) ok = false;
      });
      if (!allFilled) return { ok: null, detail: "Remplissez tous les champs." };
      return { ok, detail: ok ? "" : "Solution : " + ex.accepte.map((a) => a[0]).join(" / ") };
    };
  }

  /* ---------- Association ---------- */
  function buildAssociation(ex, body) {
    const grid = el("div", "assoc-grid");
    const colG = el("div", "assoc-col");
    const colD = el("div", "assoc-col");
    const droites = shuffle(ex.paires.map((p) => p.droite));
    const palette = ["c1", "c2", "c3", "c4", "c5", "c6"];
    let selectedLeft = null;
    const matches = {};

    ex.paires.forEach((p, i) => {
      const tile = el("button", "assoc-tile left", p.gauche);
      tile.type = "button";
      tile.dataset.i = i;
      tile.addEventListener("click", () => {
        if (tile.disabled) return;
        colG.querySelectorAll(".assoc-tile").forEach((t) => t.classList.remove("active"));
        selectedLeft = i;
        tile.classList.add("active");
      });
      colG.appendChild(tile);
    });
    droites.forEach((val) => {
      const tile = el("button", "assoc-tile right", val);
      tile.type = "button";
      tile.addEventListener("click", () => {
        if (tile.disabled || selectedLeft === null) return;
        const color = palette[selectedLeft % palette.length];
        matches[selectedLeft] = val;
        const leftTile = colG.querySelector('.assoc-tile[data-i="' + selectedLeft + '"]');
        leftTile.classList.add("matched", color);
        leftTile.classList.remove("active");
        leftTile.disabled = true;
        tile.classList.add("matched", color);
        tile.disabled = true;
        selectedLeft = null;
      });
      colD.appendChild(tile);
    });
    grid.appendChild(colG);
    grid.appendChild(colD);
    body.appendChild(grid);
    body.appendChild(el("p", "exo-indice", "Cliquez sur un mot à gauche, puis sur sa correspondance à droite."));

    return function () {
      if (Object.keys(matches).length < ex.paires.length)
        return { ok: null, detail: "Associez toutes les paires." };
      let ok = true;
      const details = [];
      ex.paires.forEach((p, i) => {
        if (!eq(matches[i], p.droite)) {
          ok = false;
          details.push(p.gauche + " → " + p.droite);
        }
      });
      return { ok, detail: ok ? "" : "Corrections : " + details.join(" ; ") };
    };
  }

  /* ---------- Conjugaison ---------- */
  function buildConjugaison(ex, body) {
    body.appendChild(el("p", "exo-question", "Verbe : <strong>" + ex.verbe + "</strong>"));
    const list = el("div", "conj-list");
    const inputs = [];
    ex.items.forEach((it) => {
      const row = el("div", "conj-row");
      row.appendChild(el("span", "conj-pron", it.pronom));
      const inp = el("input", "conj-input");
      inp.type = "text";
      inp.setAttribute("autocomplete", "off");
      inp.dataset.rep = it.reponse;
      inputs.push(inp);
      row.appendChild(inp);
      list.appendChild(row);
    });
    body.appendChild(list);

    return function () {
      let allFilled = true;
      let ok = true;
      inputs.forEach((inp) => {
        const val = inp.value.trim();
        if (!val) allFilled = false;
        const good = eq(val, inp.dataset.rep);
        inp.classList.toggle("ok", good);
        inp.classList.toggle("ko", !good && !!val);
        if (!good) ok = false;
      });
      if (!allFilled) return { ok: null, detail: "Complétez toute la conjugaison." };
      return { ok, detail: ok ? "" : "Solution : " + ex.items.map((i) => i.pronom + " " + i.reponse).join(", ") };
    };
  }

  /* ---------- Remise en ordre ---------- */
  function buildOrdre(ex, body) {
    const answer = el("div", "ordre-answer");
    answer.dataset.placeholder = "Cliquez les mots dans l'ordre…";
    const pool = el("div", "ordre-pool");
    const chosen = [];
    function refreshPlaceholder() {
      answer.classList.toggle("empty", chosen.length === 0);
    }
    shuffle(ex.mots).forEach((mot) => {
      const chip = el("button", "ordre-chip", mot);
      chip.type = "button";
      chip.addEventListener("click", () => {
        if (chip.classList.contains("used")) return;
        chip.classList.add("used");
        const placed = el("button", "ordre-chip placed", mot);
        placed.type = "button";
        placed.addEventListener("click", () => {
          placed.remove();
          chip.classList.remove("used");
          const i = chosen.indexOf(placed);
          if (i >= 0) chosen.splice(i, 1);
          refreshPlaceholder();
        });
        chosen.push(placed);
        answer.appendChild(placed);
        refreshPlaceholder();
      });
      pool.appendChild(chip);
    });
    body.appendChild(answer);
    body.appendChild(pool);
    if (ex.traduction) body.appendChild(el("p", "exo-indice", "À traduire : « " + ex.traduction + " »"));
    refreshPlaceholder();

    return function () {
      if (chosen.length === 0) return { ok: null, detail: "Composez la phrase." };
      const phrase = chosen.map((c) => c.textContent).join(" ");
      const ok = eq(phrase, ex.correct);
      return { ok, detail: ok ? "" : "Phrase correcte : « " + ex.correct + " »" };
    };
  }

  /* ---------- Traduction ---------- */
  function buildTraduction(ex, body) {
    const src = el("div", "trad-source");
    src.appendChild(el("span", "trad-flag", "🇫🇷"));
    src.appendChild(el("span", "", ex.source));
    body.appendChild(src);
    const inp = el("input", "trad-input");
    inp.type = "text";
    inp.placeholder = "Votre traduction en allemand…";
    inp.setAttribute("autocomplete", "off");
    body.appendChild(inp);
    if (ex.aide) body.appendChild(el("p", "exo-indice", "Aide : " + ex.aide));

    return function () {
      const val = inp.value.trim();
      if (!val) return { ok: null, detail: "Écrivez votre traduction." };
      const ok = matchesAny(val, ex.accepte);
      inp.classList.toggle("ok", ok);
      inp.classList.toggle("ko", !ok);
      if (ok && window.Speech) window.Speech.speak(ex.accepte[0]);
      return { ok, detail: ok ? "Bravo !" : "Réponse attendue : « " + ex.accepte[0] + " »" };
    };
  }

  /* ---------- Production écrite ---------- */
  function buildProduction(ex, body, actions, feedback, onResult) {
    body.appendChild(el("p", "exo-question", ex.prompt));
    const ta = el("textarea", "production-input");
    ta.rows = 4;
    ta.placeholder = "Rédigez votre réponse en allemand…";
    body.appendChild(ta);

    const meta = el("div", "production-meta");
    const counter = el("span", "wordcount", "0 mot");
    meta.appendChild(counter);
    if (ex.minMots) meta.appendChild(el("span", "wordmin", "objectif : ≥ " + ex.minMots + " mots"));
    body.appendChild(meta);

    ta.addEventListener("input", () => {
      const w = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
      counter.textContent = w + (w > 1 ? " mots" : " mot");
      counter.classList.toggle("ok", !ex.minMots || w >= ex.minMots);
    });

    const modele = el("div", "production-modele hidden");
    modele.innerHTML =
      '<div class="modele-head">✅ Modèle de correction <button type="button" class="btn-audio modele-audio">🔊 Écouter</button></div>' +
      '<p class="modele-text">' + ex.modele + "</p>";
    body.appendChild(modele);
    modele.querySelector(".modele-audio").addEventListener("click", () => window.Speech && window.Speech.speak(ex.modele));

    let checklistBox = null;
    if (ex.checklist && ex.checklist.length) {
      checklistBox = el("div", "production-checklist hidden");
      checklistBox.appendChild(el("p", "checklist-title", "Auto-évaluation — cochez ce que vous avez réussi :"));
      ex.checklist.forEach((c) => {
        const lab = el("label", "checklist-item");
        const cb = el("input");
        cb.type = "checkbox";
        lab.appendChild(cb);
        lab.appendChild(document.createTextNode(" " + c));
        checklistBox.appendChild(lab);
      });
      body.appendChild(checklistBox);
    }

    const verifier = el("button", "btn btn-check", "Vérifier");
    verifier.type = "button";
    const ecouter = el("button", "btn btn-ghost small", "🔊 Écouter le modèle");
    ecouter.type = "button";
    ecouter.addEventListener("click", () => window.Speech && window.Speech.speak(ex.modele));
    const voir = el("button", "btn-link", "Voir le modèle");
    voir.type = "button";
    voir.addEventListener("click", () => modele.classList.toggle("hidden"));

    verifier.addEventListener("click", () => {
      const text = ta.value.trim();
      const words = text ? text.split(/\s+/).length : 0;
      if (words === 0) {
        feedback.className = "exo-feedback show neutre";
        feedback.innerHTML = "👉 Écrivez d'abord votre réponse.";
        return;
      }
      const attendus = ex.attendus || [];
      const found = attendus.filter((a) => contains(text, a));
      const enoughWords = !ex.minMots || words >= ex.minMots;
      const enoughKeys = attendus.length === 0 || found.length >= Math.max(1, Math.ceil(attendus.length * 0.6));
      const ok = enoughWords && enoughKeys;

      modele.classList.remove("hidden");
      if (checklistBox) checklistBox.classList.remove("hidden");

      feedback.className = "exo-feedback show " + (ok ? "juste" : "faux");
      let msg = ok
        ? "✓ Bien joué ! Votre réponse contient les éléments attendus."
        : "✗ Presque ! Vérifiez les points ci-dessous.";
      msg += '<div class="prod-report">';
      msg += "<div>📝 Longueur : " + words + " mots" + (ex.minMots ? " (objectif ≥ " + ex.minMots + ")" : "") + (enoughWords ? " ✓" : " ✗") + "</div>";
      if (attendus.length) {
        msg +=
          "<div>🔑 Éléments clés utilisés : " +
          found.length + "/" + attendus.length +
          " — " +
          attendus.map((a) => (contains(text, a) ? "<span class='kw ok'>" + a + "</span>" : "<span class='kw ko'>" + a + "</span>")).join(" ") +
          "</div>";
      }
      msg += "</div>";
      msg += "<div class='exo-explication'>👉 Comparez avec le modèle ci-dessus et auto-évaluez-vous.</div>";
      feedback.innerHTML = msg;
      if (window.TG) window.TG.haptic(ok ? "success" : "warning");
      if (onResult) onResult(ok);
    });

    actions.appendChild(verifier);
    actions.appendChild(ecouter);
    actions.appendChild(voir);
  }

  /* ---------- Production orale ---------- */
  function buildOral(ex, body, actions, feedback, onResult) {
    body.appendChild(el("p", "exo-question", ex.prompt));
    const transcript = el("div", "oral-transcript hidden");
    body.appendChild(transcript);

    const modele = el("div", "production-modele hidden");
    modele.innerHTML =
      '<div class="modele-head">✅ Modèle <button type="button" class="btn-audio modele-audio">🔊 Écouter</button></div>' +
      '<p class="modele-text">' + ex.modele + "</p>";
    body.appendChild(modele);
    modele.querySelector(".modele-audio").addEventListener("click", () => window.Speech && window.Speech.speak(ex.modele));

    const supported = window.Speech && window.Speech.recognitionSupported && window.Speech.recognitionSupported();

    if (supported) {
      const mic = el("button", "btn btn-mic", "🎤 Parler");
      mic.type = "button";
      let listening = false;
      mic.addEventListener("click", () => {
        if (listening) return;
        listening = true;
        mic.classList.add("listening");
        mic.textContent = "🎙️ J'écoute…";
        transcript.classList.add("hidden");
        window.Speech.recognize(
          (alts) => {
            const best = alts[0] || "";
            transcript.classList.remove("hidden");
            transcript.innerHTML = '<span class="oral-label">Vous avez dit :</span> « ' + best + " »";
            const attendus = ex.attendus || [];
            const found = attendus.filter((a) => alts.some((alt) => contains(alt, a)));
            const ok = attendus.length === 0 ? best.trim().length > 0 : found.length >= 1;
            modele.classList.remove("hidden");
            feedback.className = "exo-feedback show " + (ok ? "juste" : "faux");
            feedback.innerHTML =
              (ok ? "✓ Bien ! On a reconnu votre production. " : "✗ Reconnaissance partielle. ") +
              (attendus.length ? "Mots clés repérés : " + found.length + "/" + attendus.length + ". " : "") +
              "<div class='exo-explication'>👉 Comparez avec le modèle et réessayez pour vous améliorer.</div>";
            if (onResult) onResult(ok);
          },
          () => {
            feedback.className = "exo-feedback show neutre";
            feedback.innerHTML = "🎤 Micro indisponible ou écoute interrompue. Utilisez l'auto-évaluation ci-dessous.";
          },
          () => {
            listening = false;
            mic.classList.remove("listening");
            mic.textContent = "🎤 Parler";
          }
        );
      });
      actions.appendChild(mic);
    } else {
      body.appendChild(
        el(
          "p",
          "exo-indice",
          "ℹ️ La reconnaissance vocale n'est pas disponible sur ce navigateur. Écoutez le modèle, répétez à voix haute, puis auto-évaluez-vous."
        )
      );
    }

    const ecouter = el("button", "btn btn-ghost small", "🔊 Écouter le modèle");
    ecouter.type = "button";
    ecouter.addEventListener("click", () => window.Speech && window.Speech.speak(ex.modele));
    actions.appendChild(ecouter);

    const voir = el("button", "btn-link", "Voir le modèle");
    voir.type = "button";
    voir.addEventListener("click", () => modele.classList.toggle("hidden"));
    actions.appendChild(voir);

    // Auto-évaluation (toujours disponible)
    const selfWrap = el("div", "oral-self");
    selfWrap.appendChild(el("span", "oral-self-label", "Auto-évaluation :"));
    const okBtn = el("button", "btn-self ok", "✅ Su le dire");
    okBtn.type = "button";
    const koBtn = el("button", "btn-self ko", "🔁 À retravailler");
    koBtn.type = "button";
    okBtn.addEventListener("click", () => {
      modele.classList.remove("hidden");
      feedback.className = "exo-feedback show juste";
      feedback.innerHTML = "✓ Super ! Continuez à pratiquer à voix haute.";
      if (onResult) onResult(true);
    });
    koBtn.addEventListener("click", () => {
      modele.classList.remove("hidden");
      feedback.className = "exo-feedback show neutre";
      feedback.innerHTML = "🔁 Pas de souci — écoutez le modèle et répétez plusieurs fois.";
      if (onResult) onResult(false);
    });
    selfWrap.appendChild(okBtn);
    selfWrap.appendChild(koBtn);
    actions.appendChild(selfWrap);
  }

  return { render, normalize, eq, matchesAny, contains, shuffle, GRADABLE };
})();

</script>
    <script>
/* =====================================================================
   app.js — Application principale (SPA)
   Routage par hash : #/ (aperçu) et #/lecon/<id> (leçon).
   Construit l'aperçu du programme et le rendu des leçons.
   ===================================================================== */
(function () {
  const COURS = window.COURS;
  const app = document.getElementById("app");

  /* Index plat des leçons (pour navigation préc./suiv.) */
  const flat = [];
  COURS.modules.forEach((m) => m.lecons.forEach((l) => flat.push({ module: m, lecon: l })));
  function leconIndex(id) {
    return flat.findIndex((x) => x.lecon.id === id);
  }

  function el(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  function speakButton(text, label) {
    const b = el("button", "btn-audio", "🔊" + (label ? " " + label : ""));
    b.type = "button";
    b.setAttribute("aria-label", "Écouter : " + text);
    b.addEventListener("click", (e) => {
      e.stopPropagation();
      window.Speech && window.Speech.speak(text);
    });
    return b;
  }

  /* ====================================================================
     APERÇU DU PROGRAMME (page d'accueil)
     ==================================================================== */
  function renderHome() {
    const s = COURS.stats;
    const res = window.Progress.resumeGlobal(COURS);
    const frag = document.createDocumentFragment();

    /* --- Hero --- */
    const hero = el("header", "hero");
    hero.innerHTML =
      '<div class="hero-flag" aria-hidden="true"><span></span><span></span><span></span></div>' +
      '<p class="hero-eyebrow">' + COURS.cadre + "</p>" +
      "<h1>" + COURS.titre + "</h1>" +
      '<p class="hero-slogan">' + COURS.slogan + "</p>" +
      '<p class="hero-desc">' + COURS.description + "</p>";

    const statsRow = el("div", "stats-row");
    [
      ["📚", s.modules, "modules"],
      ["📖", s.lecons, "leçons"],
      ["🗂️", s.mots, "mots de vocabulaire"],
      ["✍️", s.exercices, "exercices interactifs"],
      ["⏱️", "~" + s.heures + " h", "de cours"]
    ].forEach(([ic, n, lab]) => {
      const c = el("div", "stat");
      c.innerHTML = '<span class="stat-ic">' + ic + '</span><span class="stat-n">' + n + '</span><span class="stat-l">' + lab + "</span>";
      statsRow.appendChild(c);
    });
    hero.appendChild(statsRow);

    /* Barre de progression globale */
    const prog = el("div", "global-prog");
    prog.innerHTML =
      '<div class="global-prog-head"><span>Votre progression</span><span>' +
      res.faites + "/" + res.total + " leçons" +
      (res.streak ? '  ·  🔥 ' + res.streak + " j" : "") +
      "</span></div>" +
      '<div class="bar"><div class="bar-fill" style="width:' + res.pourcent + '%"></div></div>';
    hero.appendChild(prog);

    const cta = el("div", "hero-cta");
    const startId = nextLeconId(res);
    const btn = el("a", "btn btn-primary big");
    btn.href = "#/lecon/" + startId;
    btn.textContent = res.faites > 0 ? "▶ Continuer la leçon " + (leconIndex(startId) + 1) : "▶ Commencer la leçon 1";
    cta.appendChild(btn);

    // Actions secondaires : révision espacée
    const srs = window.Revision.stats(COURS);
    const secondRow = el("div", "hero-secondary");
    const revBtn = el("a", "btn btn-ghost");
    revBtn.href = "#/revision";
    revBtn.innerHTML = "🔁 Réviser" + (srs.due ? ' <span class="pill">' + srs.due + "</span>" : "");
    secondRow.appendChild(revBtn);
    cta.appendChild(secondRow);

    const audioInfo = el("p", "hero-audio-info", window.Speech && window.Speech.isSupported()
      ? "🔊 Prononciation audio allemande activée"
      : "ℹ️ Activez le son de votre navigateur pour la prononciation");
    cta.appendChild(audioInfo);
    hero.appendChild(cta);
    frag.appendChild(hero);

    /* --- Méthode --- */
    const meth = el("section", "section");
    meth.appendChild(el("h2", "section-title", "🧠 Une méthode intensive"));
    const methGrid = el("div", "method-grid");
    COURS.methode.forEach((m) => {
      const c = el("div", "method-card");
      c.innerHTML = '<div class="method-ic">' + m.icone + "</div><h3>" + m.titre + "</h3><p>" + m.texte + "</p>";
      methGrid.appendChild(c);
    });
    meth.appendChild(methGrid);
    frag.appendChild(meth);

    /* --- Modules et leçons --- */
    COURS.modules.forEach((mod) => {
      const sec = el("section", "section module");
      sec.style.setProperty("--mod-color", mod.couleur);
      const headM = el("div", "module-head");
      headM.innerHTML =
        '<div class="module-badge">' + mod.titre + "</div>" +
        "<h2>" + mod.sousTitre + "</h2>" +
        "<p>" + mod.description + "</p>";
      sec.appendChild(headM);

      const grid = el("div", "lecon-grid");
      mod.lecons.forEach((l) => {
        const done = window.Progress.estTermine(l.id);
        const card = el("a", "lecon-card" + (done ? " done" : ""));
        card.href = "#/lecon/" + l.id;
        const tags = (l.grammairePoints || [])
          .slice(0, 2)
          .map((g) => '<span class="tag">' + g + "</span>")
          .join("");
        card.innerHTML =
          '<div class="lecon-num">' + l.numero + (done ? ' <span class="check">✓</span>' : "") + "</div>" +
          '<div class="lecon-info">' +
          "<h3>" + l.titre + "</h3>" +
          '<p class="lecon-de">' + l.titreDE + "</p>" +
          '<div class="lecon-tags">' + tags + "</div>" +
          '<div class="lecon-meta"><span>⏱️ ' + l.duree + " min</span><span>🗂️ " + l.vocabulaire.length + " mots</span><span>✍️ " + l.exercices.length + "</span></div>" +
          "</div>";
        grid.appendChild(card);
      });
      sec.appendChild(grid);

      // Bandeau « Test de fin de module »
      const ts = window.Progress.getTestScore(mod.id);
      const testBar = el("div", "module-test");
      const left = el("div", "module-test-info");
      left.innerHTML =
        "<h3>📝 Test de fin de module</h3>" +
        "<p>20 questions tirées du module · seuil de réussite : " + COURS.seuilReussite + "%" +
        (ts ? '  ·  meilleur score : <strong>' + ts.meilleur + "%</strong> " + (ts.reussi ? "🏅" : "") : "") +
        "</p>";
      const testBtn = el("a", "btn btn-primary");
      testBtn.href = "#/test/" + mod.id;
      testBtn.textContent = ts ? "Repasser le test" : "Passer le test";
      testBar.appendChild(left);
      testBar.appendChild(testBtn);
      sec.appendChild(testBar);

      frag.appendChild(sec);
    });

    /* --- Aperçu grammaire --- */
    const gram = el("section", "section");
    gram.appendChild(el("h2", "section-title", "📐 Grammaire couverte (niveau A1)"));
    const gg = el("div", "gram-grid");
    Object.keys(COURS.grammaireGlobale).forEach((k) => {
      const col = el("div", "gram-col");
      col.appendChild(el("h3", "", k));
      const ul = el("ul", "");
      COURS.grammaireGlobale[k].forEach((g) => ul.appendChild(el("li", "", g)));
      col.appendChild(ul);
      gg.appendChild(col);
    });
    gram.appendChild(gg);
    frag.appendChild(gram);

    /* --- Compétences CECRL --- */
    const comp = el("section", "section comp");
    comp.appendChild(el("h2", "section-title", "🎓 À la fin du niveau A1, vous saurez…"));
    const ul = el("ul", "comp-list");
    COURS.competences.forEach((c) => ul.appendChild(el("li", "", c)));
    comp.appendChild(ul);
    frag.appendChild(comp);

    const footer = el("footer", "footer");
    const synced = window.Sync && window.Sync.available();
    footer.innerHTML =
      "<p>Cours d'allemand intensif · Niveau A1 · Méthode communicative (CECRL)</p>" +
      (synced ? '<p class="sync-badge">☁️ Progression synchronisée avec votre compte Telegram</p>' : "") +
      '<button class="btn-link" id="reset-prog">Réinitialiser ma progression</button>';
    frag.appendChild(footer);

    app.innerHTML = "";
    app.appendChild(frag);
    const rb = document.getElementById("reset-prog");
    if (rb)
      rb.addEventListener("click", () => {
        if (confirm("Effacer toute votre progression ?")) {
          window.Progress.reset();
          if (window.Revision) window.Revision.reset();
          if (window.Sync) window.Sync.clear();
          renderHome();
        }
      });

    if (window.TG) {
      window.TG.hideBackButton();
      window.TG.closingConfirmation(false);
      window.TG.setMainButton(
        res.faites > 0 ? "▶ Continuer la leçon " + (leconIndex(startId) + 1) : "▶ Commencer la leçon 1",
        () => { location.hash = "#/lecon/" + startId; }
      );
    }
    window.scrollTo(0, 0);
  }

  function nextLeconId(res) {
    for (const f of flat) if (!window.Progress.estTermine(f.lecon.id)) return f.lecon.id;
    return flat[0].lecon.id;
  }

  /* ====================================================================
     RENDU D'UNE LEÇON
     ==================================================================== */
  function renderLecon(id) {
    const idx = leconIndex(id);
    if (idx < 0) return renderHome();
    const { module: mod, lecon: l } = flat[idx];
    const frag = document.createDocumentFragment();

    /* Barre supérieure */
    const top = el("div", "lesson-top");
    top.innerHTML = '<a class="btn-link" href="#/">← Aperçu du programme</a>' +
      '<span class="lesson-top-mod">' + mod.titre + "</span>";
    frag.appendChild(top);

    /* En-tête */
    const head = el("header", "lesson-head");
    head.style.setProperty("--mod-color", mod.couleur);
    head.innerHTML =
      '<div class="lesson-num">Leçon ' + l.numero + "</div>" +
      "<h1>" + l.titre + ' <span class="de">· ' + l.titreDE + "</span></h1>" +
      '<p class="lesson-theme">Thème : ' + l.theme + '  ·  ⏱️ ' + l.duree + " min</p>";
    const obj = el("div", "objectifs");
    obj.appendChild(el("h3", "", "🎯 Objectifs"));
    const ulo = el("ul", "");
    l.objectifs.forEach((o) => ulo.appendChild(el("li", "", o)));
    obj.appendChild(ulo);
    head.appendChild(obj);
    frag.appendChild(head);

    /* Navigation par onglets (ancres) */
    const tabs = el("nav", "lesson-tabs");
    tabs.innerHTML =
      '<a href="#voc">🗂️ Vocabulaire</a>' +
      '<a href="#gram">📐 Grammaire</a>' +
      '<a href="#dlg">💬 Dialogue</a>' +
      '<a href="#exo">✍️ Exercices</a>';
    frag.appendChild(tabs);

    /* --- Vocabulaire --- */
    const voc = el("section", "lesson-section");
    voc.id = "voc";
    const vocHead = el("div", "ls-head");
    vocHead.appendChild(el("h2", "", "🗂️ Vocabulaire"));
    const playAll = el("button", "btn btn-ghost small", "🔊 Tout écouter");
    playAll.type = "button";
    playAll.addEventListener("click", () => playSequence(l.vocabulaire.map((v) => v.de)));
    vocHead.appendChild(playAll);
    voc.appendChild(vocHead);

    const vocGrid = el("div", "voc-grid");
    l.vocabulaire.forEach((v) => {
      const c = el("div", "voc-card");
      const top2 = el("div", "voc-top");
      const deWrap = el("div", "voc-de");
      deWrap.appendChild(el("span", "", v.de));
      deWrap.appendChild(speakButton(v.de));
      top2.appendChild(deWrap);
      c.appendChild(top2);
      c.appendChild(el("div", "voc-fr", v.fr));
      if (v.ex) c.appendChild(el("div", "voc-ex", "« " + v.ex + " »"));
      vocGrid.appendChild(c);
    });
    voc.appendChild(vocGrid);
    frag.appendChild(voc);

    /* --- Grammaire --- */
    const gram = el("section", "lesson-section");
    gram.id = "gram";
    gram.appendChild(el("h2", "", "📐 Grammaire"));
    l.grammaire.forEach((g) => {
      const block = el("div", "gram-block");
      block.appendChild(el("h3", "", g.titre));
      if (g.intro) block.appendChild(el("p", "gram-intro", g.intro));
      if (g.tableau) block.appendChild(buildTable(g.tableau));
      if (g.note) block.appendChild(el("p", "gram-note", g.note));
      gram.appendChild(block);
    });
    frag.appendChild(gram);

    /* --- Dialogue --- */
    const dlg = el("section", "lesson-section");
    dlg.id = "dlg";
    const dHead = el("div", "ls-head");
    dHead.appendChild(el("h2", "", "💬 Dialogue — " + l.dialogue.titre));
    const playDlg = el("button", "btn btn-ghost small", "🔊 Jouer le dialogue");
    playDlg.type = "button";
    playDlg.addEventListener("click", () => playSequence(l.dialogue.lignes.map((x) => x.de)));
    dHead.appendChild(playDlg);
    dlg.appendChild(dHead);
    if (l.dialogue.lieu) dlg.appendChild(el("p", "dlg-lieu", "📍 " + l.dialogue.lieu));
    const conv = el("div", "conv");
    l.dialogue.lignes.forEach((line, i) => {
      const row = el("div", "conv-row " + (i % 2 ? "right" : "left"));
      const bubble = el("div", "bubble");
      bubble.appendChild(el("div", "conv-loc", line.loc));
      const deLine = el("div", "conv-de");
      deLine.appendChild(el("span", "", line.de));
      deLine.appendChild(speakButton(line.de));
      bubble.appendChild(deLine);
      bubble.appendChild(el("div", "conv-fr", line.fr));
      row.appendChild(bubble);
      conv.appendChild(row);
    });
    dlg.appendChild(conv);
    frag.appendChild(dlg);

    /* --- Exercices --- */
    const exo = el("section", "lesson-section");
    exo.id = "exo";
    exo.appendChild(el("h2", "", "✍️ Exercices interactifs"));
    const exProg = el("div", "exo-progress");
    const bar = el("div", "bar");
    const fill = el("div", "bar-fill");
    bar.appendChild(fill);
    const label = el("span", "exo-progress-label", "");
    exProg.appendChild(label);
    exProg.appendChild(bar);
    exo.appendChild(exProg);

    const total = l.exercices.length;
    const done = new Set();
    const success = new Set();
    function refresh() {
      label.textContent = done.size + "/" + total + " exercices faits";
      fill.style.width = total ? (done.size / total) * 100 + "%" : "0%";
      if (done.size === total && total > 0) {
        const score = Math.round((success.size / total) * 100);
        window.Progress.marquerTermine(l.id, score);
        showCompletion(exo, score, idx);
      }
    }

    l.exercices.forEach((ex, i) => {
      const node = window.Exercises.render(ex, i, (ok) => {
        done.add(i);
        if (ok) success.add(i);
        else success.delete(i);
        window.Progress.setExercice(l.id, i, ok);
        refresh();
      });
      exo.appendChild(node);
    });
    refresh();
    frag.appendChild(exo);

    /* --- Navigation préc / suiv --- */
    const nav = el("div", "lesson-nav");
    if (idx > 0) {
      const prev = el("a", "btn btn-ghost", "← " + flat[idx - 1].lecon.titre);
      prev.href = "#/lecon/" + flat[idx - 1].lecon.id;
      nav.appendChild(prev);
    } else nav.appendChild(el("span", ""));
    if (idx < flat.length - 1) {
      const next = el("a", "btn btn-primary", flat[idx + 1].lecon.titre + " →");
      next.href = "#/lecon/" + flat[idx + 1].lecon.id;
      nav.appendChild(next);
    } else {
      const fin = el("a", "btn btn-primary", "🎉 Retour à l'aperçu");
      fin.href = "#/";
      nav.appendChild(fin);
    }
    frag.appendChild(nav);

    app.innerHTML = "";
    app.appendChild(frag);
    window.Progress.touchStreak(window.Progress.load());

    if (window.TG) {
      window.TG.showBackButton(() => { location.hash = "#/"; });
      window.TG.closingConfirmation(false);
      if (idx < flat.length - 1)
        window.TG.setMainButton(flat[idx + 1].lecon.titre + " →", () => {
          location.hash = "#/lecon/" + flat[idx + 1].lecon.id;
        });
      else window.TG.setMainButton("🎉 Terminer le cours", () => { location.hash = "#/"; });
    }
    window.scrollTo(0, 0);
  }

  function showCompletion(container, score, idx) {
    if (container.querySelector(".completion")) {
      container.querySelector(".completion .comp-score").textContent = score + "%";
      return;
    }
    const c = el("div", "completion");
    const nextBtn =
      idx < flat.length - 1
        ? '<a class="btn btn-primary" href="#/lecon/' + flat[idx + 1].lecon.id + '">Leçon suivante →</a>'
        : '<a class="btn btn-primary" href="#/">Retour à l\'aperçu</a>';
    c.innerHTML =
      '<div class="comp-emoji">🎉</div>' +
      "<h3>Leçon terminée !</h3>" +
      '<p>Score d\'exercices : <span class="comp-score">' + score + "%</span></p>" +
      nextBtn;
    container.appendChild(c);
  }

  /* Lecture séquentielle (mots ou dialogue) */
  function playSequence(list) {
    if (!window.Speech || !window.Speech.isSupported()) return;
    let i = 0;
    function next() {
      if (i >= list.length) return;
      const txt = String(list[i]).replace(/\([^)]*\)/g, "").trim();
      i++;
      const u = new SpeechSynthesisUtterance(txt);
      u.lang = "de-DE";
      u.rate = 0.9;
      u.onend = () => setTimeout(next, 250);
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }
    next();
  }

  function buildTable(t) {
    const wrap = el("div", "table-wrap");
    const table = el("table", "gram-table");
    const thead = el("thead");
    const trh = el("tr");
    t.entetes.forEach((h) => trh.appendChild(el("th", "", h)));
    thead.appendChild(trh);
    table.appendChild(thead);
    const tbody = el("tbody");
    t.lignes.forEach((row) => {
      const tr = el("tr");
      row.forEach((cell, ci) => {
        const td = el("td", ci === 0 ? "first" : "");
        td.innerHTML = cell;
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    return wrap;
  }

  /* ====================================================================
     MODE RÉVISION (répétition espacée — flashcards)
     ==================================================================== */
  function renderRevision() {
    const cards = window.Revision.getDue(COURS, window.Revision.SESSION_MAX);
    const frag = document.createDocumentFragment();
    const top = el("div", "lesson-top");
    top.innerHTML = '<a class="btn-link" href="#/">← Aperçu du programme</a><span class="lesson-top-mod">🔁 Révision espacée</span>';
    frag.appendChild(top);
    const wrap = el("section", "revision");
    frag.appendChild(wrap);
    app.innerHTML = "";
    app.appendChild(frag);
    window.scrollTo(0, 0);
    if (window.TG) {
      window.TG.showBackButton(() => { location.hash = "#/"; });
      window.TG.hideMainButton();
      window.TG.closingConfirmation(false);
    }

    if (!cards.length) {
      wrap.innerHTML =
        '<div class="revision-empty"><div class="comp-emoji">🎉</div>' +
        "<h2>Tout est à jour !</h2>" +
        "<p>Aucune carte à réviser pour l'instant. La répétition espacée vous proposera de nouvelles cartes plus tard.</p>" +
        '<a class="btn btn-primary" href="#/">Retour à l\'aperçu</a></div>';
      return;
    }

    let i = 0,
      known = 0,
      unknown = 0;

    function showSummary() {
      wrap.innerHTML =
        '<div class="revision-empty"><div class="comp-emoji">✅</div>' +
        '<h2>Session terminée !</h2>' +
        '<p class="rev-summary"><span class="su">' + known + ' sue(s)</span> · <span class="arev">' + unknown + ' à revoir</span></p>' +
        '<p>Les cartes réussies reviendront plus tard, celles à revoir très bientôt.</p>' +
        '<div class="rev-actions"><a class="btn btn-ghost" href="#/">Retour à l\'aperçu</a>' +
        '<button class="btn btn-primary" id="rev-again">Réviser encore</button></div></div>';
      const again = document.getElementById("rev-again");
      if (again) again.addEventListener("click", renderRevision);
    }

    function showCard() {
      if (i >= cards.length) return showSummary();
      const c = cards[i];
      wrap.innerHTML = "";
      const head = el("div", "revision-head");
      head.innerHTML = "<span>Carte " + (i + 1) + " / " + cards.length + "</span><span>Leçon " + c.lecon + "</span>";
      wrap.appendChild(head);
      const bar = el("div", "bar");
      const fill = el("div", "bar-fill");
      fill.style.width = (i / cards.length) * 100 + "%";
      bar.appendChild(fill);
      wrap.appendChild(bar);

      const fc = el("div", "flashcard");
      const front = el("div", "fc-front");
      const deRow = el("div", "fc-de");
      deRow.appendChild(el("span", "", c.de));
      deRow.appendChild(speakButton(c.de));
      front.appendChild(deRow);
      front.appendChild(el("p", "fc-hint", "Que signifie ce mot ?"));
      fc.appendChild(front);

      const back = el("div", "fc-back hidden");
      back.appendChild(el("div", "fc-fr", c.fr));
      if (c.ex) back.appendChild(el("p", "fc-ex", "« " + c.ex + " »"));
      fc.appendChild(back);
      wrap.appendChild(fc);

      const flip = el("button", "btn btn-primary big", "🔄 Retourner la carte");
      flip.type = "button";
      const rateRow = el("div", "rev-rate hidden");
      const koBtn = el("button", "btn-self ko big", "❌ Je ne savais pas");
      const okBtn = el("button", "btn-self ok big", "✅ Je savais");
      koBtn.type = okBtn.type = "button";
      rateRow.appendChild(koBtn);
      rateRow.appendChild(okBtn);

      flip.addEventListener("click", () => {
        back.classList.remove("hidden");
        flip.classList.add("hidden");
        rateRow.classList.remove("hidden");
        if (window.TG) window.TG.haptic("selection");
      });
      okBtn.addEventListener("click", () => {
        window.Revision.rate(c.id, true);
        if (window.TG) window.TG.haptic("success");
        known++;
        i++;
        showCard();
      });
      koBtn.addEventListener("click", () => {
        window.Revision.rate(c.id, false);
        if (window.TG) window.TG.haptic("light");
        unknown++;
        i++;
        showCard();
      });
      wrap.appendChild(flip);
      wrap.appendChild(rateRow);

      // Immersion : prononce le mot allemand à l'affichage
      if (window.Speech && window.Speech.isSupported()) window.Speech.speak(c.de);
    }

    showCard();
  }

  /* ====================================================================
     TEST DE FIN DE MODULE (noté)
     ==================================================================== */
  function renderTest(moduleId) {
    const mod = COURS.modules.find((m) => m.id === moduleId);
    if (!mod) return renderHome();

    const pool = [];
    mod.lecons.forEach((l) =>
      l.exercices.forEach((ex) => {
        if (window.Exercises.GRADABLE.indexOf(ex.type) >= 0) pool.push(ex);
      })
    );
    const N = Math.min(20, pool.length);
    const chosen = window.Exercises.shuffle(pool).slice(0, N);

    const frag = document.createDocumentFragment();
    const top = el("div", "lesson-top");
    top.innerHTML = '<a class="btn-link" href="#/">← Aperçu du programme</a><span class="lesson-top-mod">📝 Test noté</span>';
    frag.appendChild(top);

    const head = el("header", "test-head");
    head.style.setProperty("--mod-color", mod.couleur);
    head.innerHTML =
      '<div class="lesson-num">Test · ' + mod.titre + "</div>" +
      "<h1>Évaluation de fin de module</h1>" +
      "<p>" + N + " questions · seuil de réussite : <strong>" + COURS.seuilReussite +
      "%</strong>. Répondez à tout, puis cliquez sur « Terminer le test ». Les corrections s'afficheront à la fin.</p>";
    frag.appendChild(head);

    const list = el("div", "test-list");
    const nodes = [];
    chosen.forEach((ex, i) => {
      const node = window.Exercises.render(ex, i, null, { testMode: true, label: "Question " + (i + 1) });
      nodes.push(node);
      list.appendChild(node);
    });
    frag.appendChild(list);

    const result = el("div", "test-result hidden");
    const submit = el("button", "btn btn-primary big", "Terminer le test");
    submit.type = "button";
    const submitRow = el("div", "test-submit");
    submitRow.appendChild(submit);
    frag.appendChild(submitRow);
    frag.appendChild(result);

    submit.addEventListener("click", () => {
      let correct = 0,
        wrong = 0,
        blank = 0;
      nodes.forEach((node) => {
        const res = node._grade(true);
        if (res.ok === true) correct++;
        else if (res.ok === false) wrong++;
        else blank++;
      });
      const score = Math.round((correct / N) * 100);
      const reussi = score >= COURS.seuilReussite;
      window.Progress.setTestScore(mod.id, score, reussi);

      result.className = "test-result " + (reussi ? "pass" : "fail");
      result.innerHTML =
        '<div class="score-ring ' + (reussi ? "pass" : "fail") + '"><span>' + score + "%</span></div>" +
        "<h2>" + (reussi ? "🏅 Module réussi !" : "📚 Encore un effort") + "</h2>" +
        '<p class="score-detail">✓ ' + correct + " correct(s) · ✗ " + wrong + " erreur(s)" + (blank ? " · ⊘ " + blank + " sans réponse" : "") + "</p>" +
        "<p>" + (reussi
          ? "Félicitations, vous maîtrisez l'essentiel de ce module. Continuez !"
          : "Vous y êtes presque. Revoyez les questions en rouge, révisez le vocabulaire, puis repassez le test.") +
        "</p>" +
        '<div class="rev-actions">' +
        '<a class="btn btn-ghost" href="#/">Retour à l\'aperçu</a>' +
        '<a class="btn btn-ghost" href="#/revision">🔁 Réviser le vocabulaire</a>' +
        '<button class="btn btn-primary" id="test-again">Recommencer le test</button>' +
        "</div>";
      result.classList.remove("hidden");
      submit.disabled = true;
      submit.textContent = "Test terminé";
      const again = document.getElementById("test-again");
      if (again) again.addEventListener("click", () => renderTest(moduleId));
      if (window.TG) {
        window.TG.haptic(reussi ? "success" : "warning");
        window.TG.closingConfirmation(false);
        window.TG.setMainButton("Retour à l'aperçu", () => { location.hash = "#/"; });
      }
      result.scrollIntoView({ behavior: "smooth" });
    });

    app.innerHTML = "";
    app.appendChild(frag);
    if (window.TG) {
      window.TG.showBackButton(() => { location.hash = "#/"; });
      window.TG.closingConfirmation(true);
      window.TG.setMainButton("Terminer le test", () => submit.click());
    }
    window.scrollTo(0, 0);
  }

  /* ====================================================================
     ROUTAGE
     ==================================================================== */
  function route() {
    const hash = location.hash || "#/";
    let m;
    if ((m = hash.match(/^#\/lecon\/(.+)$/))) renderLecon(m[1]);
    else if ((m = hash.match(/^#\/test\/(.+)$/))) renderTest(m[1]);
    else if (hash.match(/^#\/revision/)) renderRevision();
    else renderHome();
  }

  function boot() {
    if (window.TG) window.TG.init();
    route(); // rendu immédiat avec les données locales
    // Fusion avec la progression cloud (Telegram) puis re-rendu si besoin
    if (window.Sync) window.Sync.load(function (changed) { if (changed) route(); });
  }

  window.addEventListener("hashchange", route);
  window.addEventListener("DOMContentLoaded", boot);
  // Si déjà chargé
  if (document.readyState !== "loading") boot();
})();

</script>
