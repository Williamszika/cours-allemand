<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tuteur d'allemand</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0f1115;--card:#1a1d24;--me:#2563eb;--bot:#262a33;--tx:#e8eaed;--mut:#9aa0aa;--bd:#2c303a}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;height:100vh;height:100dvh}
header{padding:10px 12px;border-bottom:1px solid var(--bd);background:var(--card)}
h1{font-size:16px;margin:0 0 8px;display:flex;justify-content:space-between;align-items:center}
h1 a{font-size:13px;color:var(--mut);text-decoration:none}
.row{display:flex;gap:6px;flex-wrap:wrap}
select{background:var(--bg);color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:6px 8px;font-size:13px}
#log{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:10px 12px;border-radius:14px;white-space:pre-wrap;line-height:1.45;font-size:15px;word-wrap:break-word}
.me{align-self:flex-end;background:var(--me);color:#fff;border-bottom-right-radius:4px}
.bot{align-self:flex-start;background:var(--bot);border-bottom-left-radius:4px}
.spk{margin-top:6px;font-size:12px;color:var(--mut);cursor:pointer;user-select:none}
.typing{color:var(--mut);font-style:italic}
footer{display:flex;gap:8px;padding:10px;border-top:1px solid var(--bd);background:var(--card)}
#txt{flex:1;background:var(--bg);color:var(--tx);border:1px solid var(--bd);border-radius:20px;padding:10px 14px;font-size:15px;resize:none;max-height:120px;font-family:inherit}
#send{background:var(--me);color:#fff;border:0;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;flex:0 0 auto}
#send:disabled{opacity:.5}
</style>
</head>
<body>
<header>
  <h1>🤖 Tuteur d'allemand <a href="/">← App</a></h1>
  <div class="row">
    <select id="niveau" title="Niveau">
      <option>A1</option><option selected>A2</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option>
    </select>
    <select id="langue" title="Ta langue">
      <option value="fr" selected>Français</option><option value="en">English</option><option value="ar">العربية</option><option value="tr">Türkçe</option><option value="ru">Русский</option><option value="uk">Українська</option><option value="es">Español</option><option value="pt">Português</option>
    </select>
    <select id="mode" title="Mode">
      <option value="general" selected>Général</option><option value="pflege">Pflege (soins)</option>
    </select>
  </div>
</header>
<div id="log"></div>
<footer>
  <textarea id="txt" rows="1" placeholder="Écris en allemand (ou pose une question)…"></textarea>
  <button id="send" title="Envoyer">➤</button>
</footer>
<script>
(function(){
  var tg=window.Telegram&&window.Telegram.WebApp; if(tg){try{tg.ready();tg.expand();}catch(e){}}
  var log=document.getElementById('log'),txt=document.getElementById('txt'),send=document.getElementById('send');
  var niveau=document.getElementById('niveau'),langue=document.getElementById('langue'),mode=document.getElementById('mode');
  try{var ln=localStorage.getItem('tut-niveau'),ll=localStorage.getItem('tut-langue');if(ln)niveau.value=ln;if(ll)langue.value=ll;}catch(e){}
  niveau.onchange=function(){try{localStorage.setItem('tut-niveau',niveau.value);}catch(e){}};
  langue.onchange=function(){try{localStorage.setItem('tut-langue',langue.value);}catch(e){}};
  var history=[],audio;
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function speak(t){
    try{if(audio)audio.pause();}catch(e){}
    var c=String(t).replace(/\*\*/g,'').replace(/[#_>]/g,'').slice(0,900);
    audio=new Audio('/api/tts?text='+encodeURIComponent(c));
    audio.play().catch(function(){});
  }
  function bubble(role,text){
    var d=document.createElement('div'); d.className='msg '+(role==='user'?'me':'bot');
    d.innerHTML=esc(text).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    if(role==='assistant'){var s=document.createElement('div');s.className='spk';s.textContent='🔊 Écouter';s.onclick=function(){speak(text);};d.appendChild(s);}
    log.appendChild(d); log.scrollTop=log.scrollHeight; return d;
  }
  function busy(b){send.disabled=b;}
  async function ask(){
    var t=txt.value.trim(); if(!t)return;
    txt.value=''; txt.style.height='auto';
    bubble('user',t); history.push({role:'user',content:t}); if(history.length>20)history=history.slice(-20);
    busy(true);
    var typing=document.createElement('div'); typing.className='msg bot typing'; typing.textContent='…';
    log.appendChild(typing); log.scrollTop=log.scrollHeight;
    try{
      var res=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({messages:history,niveau:niveau.value,langue:langue.value,mode:mode.value})});
      typing.remove();
      if(!res.ok){bubble('assistant','⚠️ Erreur '+res.status+'. Réessaie dans un instant.'); busy(false); return;}
      var j=await res.json(); var reply=j.reply||'(réponse vide)';
      history.push({role:'assistant',content:reply});
      bubble('assistant',reply);
    }catch(e){ try{typing.remove();}catch(_){} bubble('assistant','⚠️ Connexion impossible.'); }
    busy(false); txt.focus();
  }
  send.onclick=ask;
  txt.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask();}});
  txt.addEventListener('input',function(){txt.style.height='auto';txt.style.height=Math.min(txt.scrollHeight,120)+'px';});
  bubble('assistant',"Hallo! Ich bin dein Deutsch-Tutor. 🇩🇪\nÉcris-moi en allemand (même avec des fautes), ou pose-moi une question de grammaire. Choisis ton niveau en haut. Los geht's!");
  txt.focus();
})();
</script>
</body>
</html>
