<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Dashboard admin - Sprachakademie</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0f1115;--card:#1a1d24;--tx:#e8eaed;--mut:#9aa0aa;--bd:#2c303a;--ac:#2563eb}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tx);padding:14px;max-width:920px;margin:0 auto}
.center{text-align:center;color:var(--mut);padding:48px 12px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
h1{font-size:20px;margin:0}
h2{font-size:14px;margin:0 0 10px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px;text-align:center}
.stat .n{font-size:26px;font-weight:800}
.stat .l{font-size:12px;color:var(--mut);margin-top:3px}
.kv{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:14px}
.kv .k{min-width:36px;font-weight:600}
.barwrap{flex:1;height:9px;background:#0e1117;border-radius:6px;overflow:hidden}
.bar{display:block;height:100%;background:var(--ac)}
.b{font-weight:700;min-width:30px;text-align:right}
.tbl{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--bd);white-space:nowrap}
th{color:var(--mut);font-weight:600}
.mut{color:var(--mut)}
code{background:#0e1117;padding:2px 6px;border-radius:6px;font-size:13px}
input{width:100%;background:#0e1117;color:var(--tx);border:1px solid var(--bd);border-radius:10px;padding:12px;font-size:15px;margin:10px 0}
button{background:var(--ac);color:#fff;border:0;border-radius:10px;padding:11px 16px;font-size:15px;cursor:pointer;font-family:inherit}
button.ghost{background:#262a33;border:1px solid var(--bd)}
.err{color:#f87171;font-size:13px;min-height:16px}

/* ---- ultra design ---- */
body{background:radial-gradient(1100px 560px at 50% -8%,#1b2233 0%,#0f1115 58%) fixed}
.top h1{background:linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800;font-size:22px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));border:1px solid rgba(255,255,255,.08);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.28)}
.grid{grid-template-columns:repeat(4,1fr)}@media(max-width:640px){.grid{grid-template-columns:repeat(2,1fr)}}
.grid .stat{position:relative;overflow:hidden;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.012));border:1px solid rgba(255,255,255,.08)}
.grid .stat::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:#2563eb}
.grid .stat:nth-child(1)::before{background:linear-gradient(90deg,#60a5fa,#3b82f6)}
.grid .stat:nth-child(2)::before{background:linear-gradient(90deg,#34d399,#10b981)}
.grid .stat:nth-child(3)::before{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.grid .stat:nth-child(4)::before{background:linear-gradient(90deg,#f472b6,#ec4899)}
.grid .stat .n{font-size:30px;background:linear-gradient(180deg,#fff,#c7d2e0);-webkit-background-clip:text;background-clip:text;color:transparent}
.barwrap{height:10px;background:rgba(255,255,255,.06)}.bar{background:linear-gradient(90deg,#3b82f6,#8b5cf6);transition:width .7s cubic-bezier(.2,.8,.2,1)}
button{background:linear-gradient(135deg,#2563eb,#7c3aed);box-shadow:0 4px 14px rgba(37,99,235,.35);transition:transform .12s,filter .12s}button:hover{transform:translateY(-1px);filter:brightness(1.06)}button.ghost{background:rgba(255,255,255,.07);box-shadow:none}
th{position:sticky;top:0;background:#13161c;z-index:1}table tbody tr{transition:background .12s}table tbody tr:hover{background:rgba(255,255,255,.045)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:520px){.charts-grid{grid-template-columns:1fr}}
.donut-card h3{margin:0 0 8px;font-size:13px;color:var(--mut)}.donut-row{display:flex;align-items:center;gap:14px}
.donut{width:118px;height:118px;flex:none;filter:drop-shadow(0 4px 10px rgba(0,0,0,.35))}.donut-c{fill:#fff;font-size:26px;font-weight:800}
.legend{display:flex;flex-direction:column;gap:5px;font-size:13px}.leg{display:flex;align-items:center;gap:7px}.leg .dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex:none}
.growth{width:100%;height:120px;display:block;margin-top:4px}.growth-x{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-top:4px}
</style>
</head>
<body>
<div id="app"><div class="center">Chargement…</div></div>
<script>
(function(){
  var tg=window.Telegram&&window.Telegram.WebApp; if(tg){try{tg.ready();tg.expand();}catch(e){}}
  var INITDATA=(tg&&tg.initData)?tg.initData:null;
  var app=document.getElementById('app');
  var KEYK='sprach_admin_key';

  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function post(body){
    return fetch('/api/admin',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){return r.text().then(function(t){var j=null;try{j=JSON.parse(t);}catch(e){}return {status:r.status,j:j};});});
  }
  function authBody(extra){ var k=''; try{k=localStorage.getItem(KEYK)||'';}catch(e){} var b=k?{key:k}:(INITDATA?{initData:INITDATA}:{}); if(extra)for(var p in extra)b[p]=extra[p]; return b; }
  function ago(iso){ if(!iso)return '-'; var d=Date.parse(iso); if(!d)return '-'; var s=(Date.now()-d)/1000; if(s<60)return "a l'instant"; if(s<3600)return Math.floor(s/60)+' min'; if(s<86400)return Math.floor(s/3600)+' h'; return Math.floor(s/86400)+' j'; }
  function card(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+esc(l)+'</div></div>';}
  function bars(obj,order){ var max=1; order.forEach(function(k){if((obj[k]||0)>max)max=obj[k];}); return order.map(function(k){var v=obj[k]||0;return '<div class="kv"><span class="k">'+k+'</span><span class="barwrap"><span class="bar" style="width:'+Math.round(v/max*100)+'%"></span></span><span class="b">'+v+'</span></div>';}).join(''); }
  function kvlist(obj){ var ks=Object.keys(obj||{}).sort(function(a,b){return obj[b]-obj[a];}); if(!ks.length)return '<p class="mut">-</p>'; return ks.map(function(k){return '<div class="kv"><span class="k" style="min-width:auto;flex:1">'+esc(k)+'</span><span class="b">'+obj[k]+'</span></div>';}).join(''); }
  var LVLCOL=["#60a5fa","#34d399","#fbbf24","#f59e0b","#f472b6","#a78bfa"];
  function growthCard(users){ var days=30, now=Date.now(), keys=[], bk={}; for(var i=days-1;i>=0;i--){ var d=new Date(now-i*86400000).toISOString().slice(0,10); keys.push(d); bk[d]=0; } users.forEach(function(u){ var d=(u.createdAt||'').slice(0,10); if(d in bk) bk[d]++; }); var vals=keys.map(function(k){return bk[k];}); var mx=Math.max.apply(null,[1].concat(vals)); var tot=vals.reduce(function(a,b){return a+b;},0); var bw=100/keys.length; var bars=vals.map(function(v,i){ var hh=v/mx*94; return '<rect x="'+(i*bw+bw*0.15).toFixed(2)+'" y="'+(100-hh).toFixed(2)+'" width="'+(bw*0.7).toFixed(2)+'" height="'+hh.toFixed(2)+'" rx="0.5" fill="url(#gG)"><title>'+keys[i]+' : '+v+'</title></rect>'; }).join(''); return '<div class="card"><h2>\uD83D\uDCC8 Inscriptions (30 j) - '+tot+'</h2><svg viewBox="0 0 100 100" preserveAspectRatio="none" class="growth"><defs><linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#2563eb"/></linearGradient></defs>'+bars+'</svg><div class="growth-x"><span>'+keys[0].slice(5)+'</span><span>'+keys[keys.length-1].slice(5)+'</span></div></div>'; }
  function donut(title,segs){var tot=segs.reduce(function(a,x){return a+x.value;},0);var d=tot||1;var R=52,C=2*Math.PI*R,off=0,arcs="";segs.forEach(function(sg){var len=sg.value/d*C;arcs+='<circle cx="70" cy="70" r="'+R+'" fill="none" stroke="'+sg.color+'" stroke-width="18" stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 70 70)"/>';off+=len;});var leg=segs.map(function(sg){return '<div class="leg"><span class="dot" style="background:'+sg.color+'"></span>'+esc(sg.label)+' <b>'+sg.value+'</b></div>';}).join('')||'<span class="mut">Aucune donnée</span>';return '<div class="donut-card"><h3>'+title+'</h3><div class="donut-row"><svg viewBox="0 0 140 140" class="donut">'+arcs+'<text x="70" y="79" text-anchor="middle" class="donut-c">'+tot+'</text></svg><div class="legend">'+leg+'</div></div></div>';}


  function render(data){
    var s=data.stats||{}, users=data.users||[];
    var h='<div class="top"><h1>📊 Dashboard</h1><div style="display:flex;gap:8px"><button id="csv-exp" class="ghost">⬇ CSV</button><button id="refresh" class="ghost">↻ Rafraîchir</button></div></div>';
    h+='<div class="grid">'+card(s.total||0,'Utilisateurs')+card(s.new7||0,'Nouveaux (7j)')+card(s.active7||0,'Actifs (7j)')+card(s.messages||0,'Messages tuteur')+'</div>';
    var __lvlS=["A1","A2","B1","B2","C1","C2"].map(function(n,i){return {label:n,value:(s.byLevel&&s.byLevel[n])||0,color:LVLCOL[i]};}).filter(function(x){return x.value>0;});
    var __ac={actif:0,peu:0,inactif:0}; users.forEach(function(u){var t=Date.parse(u.lastSeen||0)||0; var hh=t?(Date.now()-t)/3600000:1e9; __ac[hh<=48?'actif':(hh<=168?'peu':'inactif')]++;});
    var __acS=[{label:'Actifs',value:__ac.actif,color:'#16a34a'},{label:'Peu actifs',value:__ac.peu,color:'#d97706'},{label:'Inactifs',value:__ac.inactif,color:'#9ca3af'}].filter(function(x){return x.value>0;});
    var __LC=['#60a5fa','#34d399','#fbbf24','#f59e0b','#f472b6','#a78bfa','#22d3ee','#fb7185']; var __lngS=Object.keys(s.byLang||{}).sort(function(a,b){return (s.byLang[b]||0)-(s.byLang[a]||0);}).slice(0,8).map(function(k,i){return {label:k,value:s.byLang[k],color:__LC[i%__LC.length]};});
    h+='<div class="card"><h2>\uD83D\uDCCA R\u00e9partition</h2><div class="charts-grid">'+donut('Niveaux',__lvlS)+donut('Activit\u00e9',__acS)+donut('Langues',__lngS)+'</div></div>';
    h+=growthCard(users);
    if ((s.competences || []).length) {
      var cw = s.competences.filter(function (r) { return r.users >= 1; }).slice(0, 14);
      h += '<div class="card"><h2>Compétences les plus faibles (global)</h2>';
      cw.forEach(function (r) {
        var col = r.score >= 80 ? "#16a34a" : (r.score >= 50 ? "#d97706" : "#dc2626");
        h += '<div class="kv"><span class="k" style="min-width:auto;flex:1">' + esc(r.label) + ' <span class="mut" style="font-size:12px">(' + esc(r.niveau) + ' · ' + r.users + ' app.' + (r.weak ? ', ' + r.weak + ' en diff.' : '') + ')</span></span><span class="barwrap"><span class="bar" style="width:' + r.score + '%;background:' + col + '"></span></span><span class="b">' + r.score + '%</span></div>';
      });
      h += '</div>';
    }
    if((s.topReferrers||[]).length){ h+='<div class="card"><h2>Top parrains</h2>'+s.topReferrers.map(function(r){return '<div class="kv"><span class="k" style="min-width:auto;flex:1">'+esc(r.name||('id '+r.id))+'</span><span class="b">'+r.count+'</span></div>';}).join('')+'</div>'; }
    h+='<div class="card"><h2>📣 Diffusion</h2><p class="mut" style="margin-bottom:8px">Envoie un message Telegram à tous les utilisateurs actifs (hors bloqués).</p><textarea id="bc-msg" placeholder="Ton message…" style="width:100%;box-sizing:border-box;min-height:80px;padding:10px;border-radius:8px;border:1px solid #8884;background:transparent;color:inherit;font:inherit"></textarea><div style="margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><button id="bc-send">Envoyer à tous</button><span id="bc-res" class="mut"></span></div></div>';
    h+='<div class="card"><h2>Utilisateurs ('+users.length+')</h2>'
      +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">'
      +'<input id="u-q" placeholder="\uD83D\uDD0E nom, @user, id" style="flex:1;min-width:150px;padding:8px 10px;border-radius:8px;border:1px solid #8884;background:transparent;color:inherit">'
      +'<select id="u-lvl" style="padding:8px;border-radius:8px"><option value="">Niveau</option><option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option></select>'
      +'<select id="u-lang" style="padding:8px;border-radius:8px"><option value="">Langue</option>'+Object.keys(s.byLang||{}).sort().map(function(x){return "<option>"+esc(x)+"</option>";}).join("")+'</select>'
      +'<select id="u-act" style="padding:8px;border-radius:8px"><option value="">Activité</option><option value="actif">🟢 Actifs</option><option value="peu">🟡 Peu actifs</option><option value="inactif">⚪ Inactifs</option></select>'
      +'<label class="mut" style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="u-blk"> bloqu\u00e9s</label>'
      +'</div>'
      +'<div class="tbl"><table><thead><tr>'
      +'<th data-k="name" style="cursor:pointer">Nom</th><th data-k="lvl" style="cursor:pointer">Niv</th><th data-k="lang" style="cursor:pointer">Lng</th><th data-k="streak" style="cursor:pointer">S\u00e9rie</th><th data-k="msgs" style="cursor:pointer">Msg</th><th data-k="invited" style="cursor:pointer">Fil.</th><th data-k="lastSeen" style="cursor:pointer">Vu</th><th>Actions</th>'
      +'</tr></thead><tbody id="u-tb"></tbody></table></div><p id="u-n" class="mut" style="margin-top:6px"></p></div>';
    app.innerHTML=h;
    document.getElementById('refresh').onclick=start;
    (function(){var b=document.getElementById('csv-exp'); if(!b)return; b.onclick=function(){ var cols=['id','name','username','lvl','lang','streak','msgs','invited','done','exams','blocked','createdAt','lastSeen']; function q(v){v=(v==null?'':String(v)); return /[";]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;} var rows=[cols.join(';')].concat(users.map(function(u){return cols.map(function(c){return q(u[c]);}).join(';');})); var blob=new Blob([String.fromCharCode(0xFEFF)+rows.join(String.fromCharCode(10))],{type:'text/csv;charset=utf-8'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='utilisateurs-'+(new Date().toISOString().slice(0,10))+'.csv'; document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(a.href); a.remove();},1000); }; })();
    var __sortK="lastSeen", __sortD=-1;
    function __act(u){ var t=Date.parse(u.lastSeen||0)||0; if(!t)return 'inactif'; var h=(Date.now()-t)/3600000; return h<=48?'actif':(h<=168?'peu':'inactif'); }
    function __dot(u){ var a=__act(u); var col=a==='actif'?'#16a34a':(a==='peu'?'#d97706':'#9ca3af'); var lbl=a==='actif'?'actif (<48h)':(a==='peu'?'peu actif (<7j)':'inactif (>7j)'); return '<span title="'+lbl+'" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+col+';margin-right:6px;vertical-align:middle"></span>'; }
    function __row(u){
      var nm=esc(u.name||('id '+u.id)); if(u.username)nm+=' <span class="mut">@'+esc(u.username)+'</span>'; if(u.blocked)nm='<span style="color:#dc2626">(bloque)</span> '+nm;
      var act=(u.blocked?'<button class="ghost" data-act="unblock" data-id="'+esc(u.id)+'">Debloquer</button>':'<button class="ghost" data-act="block" data-id="'+esc(u.id)+'">Bloquer</button>')+' <button class="ghost" style="color:#dc2626;border-color:#dc2626" data-act="delete" data-id="'+esc(u.id)+'" data-name="'+esc(u.name||u.id)+'">Supprimer</button>';
      return '<tr class="u-row" data-id="'+esc(u.id)+'"'+(u.blocked?' style="opacity:.55"':'')+'><td>'+__dot(u)+nm+'</td><td>'+esc(u.lvl)+'</td><td>'+esc(u.lang)+'</td><td>'+(u.streak||0)+'</td><td>'+(u.msgs||0)+'</td><td>'+(u.invited||0)+'</td><td class="mut">'+ago(u.lastSeen)+'</td><td class="act" style="white-space:nowrap">'+act+'</td></tr>';
    }
    function __kv(k,v){return '<div class="kv"><span class="k" style="min-width:120px">'+k+'</span><span class="b" style="flex:1;text-align:left">'+v+'</span></div>';}
    function __detail(u){
      var d='';
      d+=__kv('ID','<code>'+esc(u.id)+'</code>');
      d+=__kv('Niveau',esc(u.lvl));
      d+=__kv('Langue',esc(u.lang));
      d+=__kv('S\u00e9rie',(u.streak||0)+' j');
      d+=__kv('Messages tuteur',(u.msgs||0));
      d+=__kv('Filleuls',(u.invited||0));
      d+=__kv('Leçons terminées',(u.done||0));
      d+=__kv('Examens réussis',(u.exams||0));
      d+=__kv('Inscrit',u.createdAt?(new Date(u.createdAt).toLocaleDateString()+' ('+ago(u.createdAt)+')'):'-');
      d+=__kv('Derni\u00e8re activit\u00e9',ago(u.lastSeen));
      d+=__kv('Statut',u.blocked?'<span style="color:#dc2626">bloqu\u00e9</span>':'actif');
      return '<tr class="u-det"><td colspan="8" style="background:#8881;padding:10px 12px">'+d+'</td></tr>';
    }
    function __paint(){
      var q=(document.getElementById('u-q').value||'').trim().toLowerCase();
      var fl=document.getElementById('u-lvl').value, fg=document.getElementById('u-lang').value, fb=document.getElementById('u-blk').checked, fa=document.getElementById('u-act').value;
      var list=users.filter(function(u){ if(fl&&u.lvl!==fl)return false; if(fg&&u.lang!==fg)return false; if(fb&&!u.blocked)return false; if(fa&&__act(u)!==fa)return false; if(q){var hay=((u.name||'')+' '+(u.username||'')+' '+(u.id||'')).toLowerCase(); if(hay.indexOf(q)<0)return false;} return true; });
      list.sort(function(a,b){ var x,y; if(__sortK==='lastSeen'){x=Date.parse(a.lastSeen||0)||0;y=Date.parse(b.lastSeen||0)||0;} else if(__sortK==='name'){x=(a.name||'').toLowerCase();y=(b.name||'').toLowerCase();} else if(__sortK==='lvl'||__sortK==='lang'){x=String(a[__sortK]||'');y=String(b[__sortK]||'');} else {x=a[__sortK]||0;y=b[__sortK]||0;} if(typeof x==='string'&&typeof y==='string')return __sortD*x.localeCompare(y); return __sortD*((x||0)-(y||0)); });
      var tb=document.getElementById('u-tb'); tb.innerHTML=list.length?list.slice(0,500).map(__row).join(''):'<tr><td colspan="8" class="mut">Aucun r\u00e9sultat.</td></tr>';
      document.getElementById('u-n').textContent=list.length+' / '+users.length+' affich\u00e9s'+(list.length>500?' (500 max)':'');
    }
    ['u-q','u-lvl','u-lang','u-blk','u-act'].forEach(function(id){var e=document.getElementById(id); if(e){e.addEventListener('input',__paint); e.addEventListener('change',__paint);}});
    Array.prototype.forEach.call(app.querySelectorAll('th[data-k]'),function(th){th.addEventListener('click',function(){var k=th.getAttribute('data-k'); if(__sortK===k)__sortD=-__sortD; else {__sortK=k; __sortD=(k==='name'||k==='lvl'||k==='lang')?1:-1;} __paint();});});
    var __tb=document.getElementById('u-tb');
    if(__tb)__tb.addEventListener('click',function(e){
      var b=e.target&&e.target.closest&&e.target.closest('button[data-act]');
      if(b){ var a=b.getAttribute('data-act'), id=b.getAttribute('data-id'); if(a==='delete'&&!confirm('Supprimer DEFINITIVEMENT le compte '+(b.getAttribute('data-name')||id)+' ? Action irreversible.'))return; if(a==='block'&&!confirm('Bloquer ce compte ? Il ne pourra plus utiliser le tuteur.'))return; b.disabled=true; var old=b.textContent; b.textContent='...'; post(authBody({action:a,target:id})).then(function(res){ if(res.status===200&&res.j&&res.j.ok){ start(); } else { alert('Echec: '+((res.j&&res.j.error)||res.status)); b.disabled=false; b.textContent=old; } }).catch(function(){ alert('Erreur reseau.'); b.disabled=false; b.textContent=old; }); return; }
      var tr=e.target&&e.target.closest&&e.target.closest('tr.u-row'); if(!tr)return;
      var nx=tr.nextSibling; if(nx&&nx.className==='u-det'){ nx.parentNode.removeChild(nx); return; }
      Array.prototype.forEach.call(__tb.querySelectorAll('tr.u-det'),function(x){x.parentNode.removeChild(x);});
      var id=tr.getAttribute('data-id'); var u=users.filter(function(x){return String(x.id)===String(id);})[0]; if(!u)return;
      tr.insertAdjacentHTML('afterend',__detail(u));
    });
    __paint();
    (function(){var b=document.getElementById('bc-send'); if(!b)return; b.addEventListener('click',function(){ var ta=document.getElementById('bc-msg'), res=document.getElementById('bc-res'); var msg=(ta.value||'').trim(); if(!msg){res.textContent='Message vide.';return;} if(!confirm('Envoyer ce message a TOUS les utilisateurs actifs ?'))return; b.disabled=true; res.textContent='Envoi en cours...'; post(authBody({action:'broadcast',message:msg})).then(function(r){ if(r.status===200&&r.j&&r.j.ok){ res.textContent='Diffusion lancee vers '+r.j.count+' utilisateurs.'; ta.value=''; } else { res.textContent='Echec: '+((r.j&&r.j.error)||r.status); } b.disabled=false; }).catch(function(){ res.textContent='Erreur reseau.'; b.disabled=false; }); }); })();
  }

  function locked(viewerId){
    var h='<div class="card"><h1>🔒 Dashboard admin</h1>';
    h+='<p class="mut">Accès réservé. Entre le mot de passe admin'+(INITDATA?", ou ouvre cette page depuis ton compte Telegram autorisé.":".")+'</p>';
    if(viewerId){ h+='<p class="mut">Ton ID Telegram : <code>'+esc(viewerId)+'</code><br>Mets-le dans <code>ADMIN_ID</code> côté serveur pour un accès automatique depuis Telegram.</p>'; }
    h+='<input id="pw" type="password" placeholder="Mot de passe admin" autocomplete="current-password" />';
    h+='<button id="go">Voir le dashboard</button> <button id="forget" class="ghost" type="button">Oublier</button>';
    h+='<p id="err" class="err"></p></div>';
    app.innerHTML=h;
    var pw=document.getElementById('pw'), err=document.getElementById('err');
    document.getElementById('go').onclick=function(){
      var k=pw.value.trim(); if(!k){return;} err.textContent='…';
      post({key:k}).then(function(res){ if(res.status===200&&res.j&&res.j.ok){ try{localStorage.setItem(KEYK,k);}catch(e){} render(res.j); } else { err.textContent='Mot de passe incorrect.'; } }).catch(function(){ err.textContent='Erreur réseau.'; });
    };
    document.getElementById('forget').onclick=function(){ try{localStorage.removeItem(KEYK);}catch(e){} err.textContent='Mot de passe oublié.'; pw.value=''; };
    pw.addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('go').click(); });
  }

  function start(){
    app.innerHTML='<div class="center">Chargement…</div>';
    var key=''; try{key=localStorage.getItem(KEYK)||'';}catch(e){}
    var tries=[];
    if(INITDATA) tries.push({initData:INITDATA});
    if(key) tries.push({key:key});
    (function run(i){
      if(i>=tries.length){
        if(INITDATA){ post({initData:INITDATA}).then(function(res){ locked(res.j&&res.j.viewerId); }).catch(function(){ locked(null); }); }
        else { locked(null); }
        return;
      }
      post(tries[i]).then(function(res){ if(res.status===200&&res.j&&res.j.ok){ render(res.j); } else { run(i+1); } }).catch(function(){ run(i+1); });
    })(0);
  }

  start();
})();
</script>
