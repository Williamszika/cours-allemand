<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Dashboard admin - Sprachakademie</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0f1115;--card:#1a1d24;--tx:#e8eaed;--mut:#9aa0aa;--bd:#2c303a;--ac:#2563eb}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tx);padding:14px;max-width:920px;margin:0 auto}
.center{text-align:center;color:var(--mut);padding:48px 12px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
h1{font-size:20px;margin:0}
h2{font-size:14px;margin:0 0 10px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px;text-align:center}
.stat .n{font-size:26px;font-weight:800}
.stat .l{font-size:12px;color:var(--mut);margin-top:3px}
.kv{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:14px}
.kv .k{min-width:36px;font-weight:600}
.barwrap{flex:1;height:9px;background:#0e1117;border-radius:6px;overflow:hidden}
.bar{display:block;height:100%;background:var(--ac)}
.b{font-weight:700;min-width:30px;text-align:right}
.tbl{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--bd);white-space:nowrap}
th{color:var(--mut);font-weight:600}
.mut{color:var(--mut)}
code{background:#0e1117;padding:2px 6px;border-radius:6px;font-size:13px}
input{width:100%;background:#0e1117;color:var(--tx);border:1px solid var(--bd);border-radius:10px;padding:12px;font-size:15px;margin:10px 0}
button{background:var(--ac);color:#fff;border:0;border-radius:10px;padding:11px 16px;font-size:15px;cursor:pointer;font-family:inherit}
button.ghost{background:#262a33;border:1px solid var(--bd)}
.err{color:#f87171;font-size:13px;min-height:16px}
</style>
</head>
<body>
<div id="app"><div class="center">Chargement…</div></div>
<script>
(function(){
  var tg=window.Telegram&&window.Telegram.WebApp; if(tg){try{tg.ready();tg.expand();}catch(e){}}
  var INITDATA=(tg&&tg.initData)?tg.initData:null;
  var app=document.getElementById('app');
  var KEYK='sprach_admin_key';

  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function post(body){
    return fetch('/api/admin',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){return r.text().then(function(t){var j=null;try{j=JSON.parse(t);}catch(e){}return {status:r.status,j:j};});});
  }
  function ago(iso){ if(!iso)return '-'; var d=Date.parse(iso); if(!d)return '-'; var s=(Date.now()-d)/1000; if(s<60)return "a l'instant"; if(s<3600)return Math.floor(s/60)+' min'; if(s<86400)return Math.floor(s/3600)+' h'; return Math.floor(s/86400)+' j'; }
  function card(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+esc(l)+'</div></div>';}
  function bars(obj,order){ var max=1; order.forEach(function(k){if((obj[k]||0)>max)max=obj[k];}); return order.map(function(k){var v=obj[k]||0;return '<div class="kv"><span class="k">'+k+'</span><span class="barwrap"><span class="bar" style="width:'+Math.round(v/max*100)+'%"></span></span><span class="b">'+v+'</span></div>';}).join(''); }
  function kvlist(obj){ var ks=Object.keys(obj||{}).sort(function(a,b){return obj[b]-obj[a];}); if(!ks.length)return '<p class="mut">-</p>'; return ks.map(function(k){return '<div class="kv"><span class="k" style="min-width:auto;flex:1">'+esc(k)+'</span><span class="b">'+obj[k]+'</span></div>';}).join(''); }

  function render(data){
    var s=data.stats||{}, users=data.users||[];
    var h='<div class="top"><h1>📊 Dashboard</h1><button id="refresh" class="ghost">↻ Rafraîchir</button></div>';
    h+='<div class="grid">'+card(s.total||0,'Utilisateurs')+card(s.new7||0,'Nouveaux (7j)')+card(s.active7||0,'Actifs (7j)')+card(s.messages||0,'Messages tuteur')+'</div>';
    h+='<div class="card"><h2>Niveaux</h2>'+bars(s.byLevel||{},["A1","A2","B1","B2","C1","C2"])+'</div>';
    h+='<div class="card"><h2>Langues</h2>'+kvlist(s.byLang||{})+'</div>';
    if((s.topReferrers||[]).length){ h+='<div class="card"><h2>Top parrains</h2>'+s.topReferrers.map(function(r){return '<div class="kv"><span class="k" style="min-width:auto;flex:1">'+esc(r.name||('id '+r.id))+'</span><span class="b">'+r.count+'</span></div>';}).join('')+'</div>'; }
    var rows=users.slice(0,400).map(function(u){
      var nm=esc(u.name||('id '+u.id)); if(u.username)nm+=' <span class="mut">@'+esc(u.username)+'</span>';
      return '<tr><td>'+nm+'</td><td>'+esc(u.lvl)+'</td><td>'+esc(u.lang)+'</td><td>'+(u.streak||0)+'</td><td>'+(u.msgs||0)+'</td><td>'+(u.invited||0)+'</td><td class="mut">'+ago(u.lastSeen)+'</td></tr>';
    }).join('');
    h+='<div class="card"><h2>Utilisateurs ('+users.length+')</h2><div class="tbl"><table><thead><tr><th>Nom</th><th>Niv</th><th>Lng</th><th>Série</th><th>Msg</th><th>Filleuls</th><th>Vu</th></tr></thead><tbody>'+(rows||'<tr><td colspan="7" class="mut">Aucun utilisateur pour l\'instant.</td></tr>')+'</tbody></table></div></div>';
    app.innerHTML=h;
    document.getElementById('refresh').onclick=start;
  }

  function locked(viewerId){
    var h='<div class="card"><h1>🔒 Dashboard admin</h1>';
    h+='<p class="mut">Accès réservé. Entre le mot de passe admin'+(INITDATA?", ou ouvre cette page depuis ton compte Telegram autorisé.":".")+'</p>';
    if(viewerId){ h+='<p class="mut">Ton ID Telegram : <code>'+esc(viewerId)+'</code><br>Mets-le dans <code>ADMIN_ID</code> côté serveur pour un accès automatique depuis Telegram.</p>'; }
    h+='<input id="pw" type="password" placeholder="Mot de passe admin" autocomplete="current-password" />';
    h+='<button id="go">Voir le dashboard</button> <button id="forget" class="ghost" type="button">Oublier</button>';
    h+='<p id="err" class="err"></p></div>';
    app.innerHTML=h;
    var pw=document.getElementById('pw'), err=document.getElementById('err');
    document.getElementById('go').onclick=function(){
      var k=pw.value.trim(); if(!k){return;} err.textContent='…';
      post({key:k}).then(function(res){ if(res.status===200&&res.j&&res.j.ok){ try{localStorage.setItem(KEYK,k);}catch(e){} render(res.j); } else { err.textContent='Mot de passe incorrect.'; } }).catch(function(){ err.textContent='Erreur réseau.'; });
    };
    document.getElementById('forget').onclick=function(){ try{localStorage.removeItem(KEYK);}catch(e){} err.textContent='Mot de passe oublié.'; pw.value=''; };
    pw.addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('go').click(); });
  }

  function start(){
    app.innerHTML='<div class="center">Chargement…</div>';
    var key=''; try{key=localStorage.getItem(KEYK)||'';}catch(e){}
    var tries=[];
    if(INITDATA) tries.push({initData:INITDATA});
    if(key) tries.push({key:key});
    (function run(i){
      if(i>=tries.length){
        if(INITDATA){ post({initData:INITDATA}).then(function(res){ locked(res.j&&res.j.viewerId); }).catch(function(){ locked(null); }); }
        else { locked(null); }
        return;
      }
      post(tries[i]).then(function(res){ if(res.status===200&&res.j&&res.j.ok){ render(res.j); } else { run(i+1); } }).catch(function(){ run(i+1); });
    })(0);
  }

  start();
})();
</script>
</body>
</html>
